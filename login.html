<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    font-family: Arial, sans-serif;
}

.login-box {
    background-color: rgba(255, 255, 255, 0.9);
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.3);
    width: 350px;
    text-align: center;
}

.login-box h1 {
    margin-bottom: 30px;
    color: #2575fc;
    text-shadow: 1px 1px 2px #6a11cb;
    font-size: 28px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from {
        text-shadow: 0 0 5px #6a11cb, 0 0 10px #2575fc;
    }
    to {
        text-shadow: 0 0 20px #6a11cb, 0 0 30px #2575fc;
    }
}

input {
    width: 80%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 16px;
}

button {
    padding: 12px 25px;
    margin-top: 15px;
    border: none;
    border-radius: 8px;
    background: #2575fc;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #6a11cb;
    transform: scale(1.05);
}
</style>
</head>
<body>
    <div class="login-box">
        <h1>Log-in Portal</h1>
        <input type="email" id="user" placeholder="Application ID/Email"> <br><br>
        <input type="password" id="pass" placeholder="Password"> <br><br>
        <button type="button" onclick="login()">Login</button>
        
        <p id="msg"></p>

        <script>
    function login(){
        const user = document.getElementById("user").value;
        const pass = document.getElementById("pass").value; 
        const msg = document.getElementById("msg");

        const adminUser = "abc@gmail.com";
        const adminPass = "suroj003";

        if(user === adminUser && pass === adminPass){
            msg.style.color = "green";
            msg.textContent = "Login Successful! Redirecting...";
            
            // This line opens the next page
            window.location.href = "admissionform.html"; 
        }
        else {
            msg.style.color = "red";
            msg.textContent = "Invalid Username or password";
        }
    }
</script>
    </div>    
</body>
</html>
